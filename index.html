<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApiC – Control de Facturas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d0f14;
  --surface:   #13161e;
  --card:      #191d28;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.14);
  --text:      #e8eaf0;
  --muted:     #6b7280;
  --accent:    #4f8ef7;
  --accent2:   #6ee7b7;
  --danger:    #ef4444;
  --warn:      #f59e0b;
  --success:   #22c55e;
  --purple:    #a78bfa;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r:         12px;
  --r-sm:      8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Scrollbar ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 99px; }

/* ── Layout ─────────────────────────────────────────────────── */
.app { display: flex; min-height: 100vh; }

/* ── Sidebar ────────────────────────────────────────────────── */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
}
.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo h1 {
  font-family: var(--font-head);
  font-size: 22px; font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sidebar-logo p { font-size: 11px; color: var(--muted); margin-top: 2px; }

.sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
.nav-section { margin-bottom: 20px; }
.nav-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--muted);
  padding: 6px 14px; margin-bottom: 4px;
}
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 10px 14px;
  border: none; background: none;
  color: var(--muted); font-family: var(--font-body);
  font-size: 13.5px; font-weight: 500;
  border-radius: var(--r-sm); cursor: pointer;
  transition: all .18s; text-align: left;
}
.nav-btn svg { flex-shrink: 0; }
.nav-btn:hover { background: var(--card); color: var(--text); }
.nav-btn.active { background: rgba(79,142,247,0.12); color: var(--accent); }
.nav-btn .badge {
  margin-left: auto;
  background: var(--danger); color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 99px;
}

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--muted);
}

/* ── Main ───────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; flex: 1; }
.topbar-date { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }

.content { flex: 1; padding: 28px; overflow-y: auto; }

/* ── KPI Cards ──────────────────────────────────────────────── */
.kpi-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px; }
.kpi {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 22px;
  position: relative; overflow: hidden;
}
.kpi::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 3px; height: 100%; border-radius: 0 2px 2px 0;
}
.kpi.danger::before { background: var(--danger); }
.kpi.warn::before   { background: var(--warn); }
.kpi.ok::before     { background: var(--success); }

.kpi-label { font-size: 11px; font-weight: 600; letter-spacing: .8px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.kpi-val { font-family: var(--font-mono); font-size: 26px; font-weight: 500; letter-spacing: -1px; }
.kpi.danger .kpi-val { color: var(--danger); }
.kpi.warn   .kpi-val { color: var(--warn); }
.kpi.ok     .kpi-val { color: var(--success); }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Search / Actions bar ───────────────────────────────────── */
.actions-bar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px;
}
.search-wrap { position: relative; flex: 1; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.search-input {
  width: 100%; padding: 10px 12px 10px 38px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--text);
  font-family: var(--font-body); font-size: 14px;
  transition: border-color .18s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { outline: none; border-color: var(--accent); }

/* ── Buttons ────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 16px; border: none; border-radius: var(--r-sm);
  font-family: var(--font-body); font-size: 13.5px; font-weight: 500;
  cursor: pointer; transition: all .18s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #3b7de8; }
.btn-secondary { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--border-hi); }
.btn-danger  { background: rgba(239,68,68,.12); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
.btn-danger:hover  { background: rgba(239,68,68,.22); }
.btn-success { background: rgba(34,197,94,.12); color: var(--success); border: 1px solid rgba(34,197,94,.2); }
.btn-success:hover { background: rgba(34,197,94,.22); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 7px; }

/* ── Table ──────────────────────────────────────────────────── */
.table-wrap { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--card); }
th {
  padding: 11px 16px; text-align: left;
  font-size: 11px; font-weight: 600; letter-spacing: .8px;
  text-transform: uppercase; color: var(--muted);
  border-bottom: 1px solid var(--border);
}
td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

/* ── Badges ─────────────────────────────────────────────────── */
.badge-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 99px;
  font-size: 11px; font-weight: 600; letter-spacing: .3px;
}
.badge-vencida   { background: rgba(239,68,68,.15);  color: var(--danger); border: 1px solid rgba(239,68,68,.25); }
.badge-pendiente { background: rgba(245,158,11,.15); color: var(--warn);   border: 1px solid rgba(245,158,11,.25); }
.badge-pagada    { background: rgba(34,197,94,.15);  color: var(--success); border: 1px solid rgba(34,197,94,.25); }
.badge-cheque    { background: rgba(167,139,250,.15); color: var(--purple); border: 1px solid rgba(167,139,250,.25); }
.badge-deposito  { background: rgba(79,142,247,.15);  color: var(--accent); border: 1px solid rgba(79,142,247,.25); }
.badge-tipo      { background: rgba(110,231,183,.1);  color: var(--accent2); border: 1px solid rgba(110,231,183,.2); font-size: 10px; }

/* ── Entidad card ────────────────────────────────────────────── */
.entity-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 16px; }
.entity-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 20px;
  cursor: pointer; transition: all .2s;
}
.entity-card:hover { border-color: var(--border-hi); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
.entity-card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
.entity-nit { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 3px; }
.entity-name { font-family: var(--font-head); font-size: 15px; font-weight: 700; }
.entity-stats { display: flex; gap: 12px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.entity-stat { text-align: center; flex: 1; }
.entity-stat-val { font-family: var(--font-mono); font-size: 15px; font-weight: 500; }
.entity-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; }

/* ── Factura Detail Panel ────────────────────────────────────── */
.detail-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 24px;
}
.back-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); padding: 8px 14px;
  border-radius: var(--r-sm); cursor: pointer;
  font-size: 13px; transition: all .18s;
}
.back-btn:hover { color: var(--text); border-color: var(--border-hi); }

/* ── Modal ──────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}
.overlay.active { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border-hi);
  border-radius: 16px; width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  animation: slideUp .22s ease;
}
@keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 24px 18px; border-bottom: 1px solid var(--border);
}
.modal-title { font-family: var(--font-head); font-size: 17px; font-weight: 700; }
.modal-close {
  background: none; border: none; color: var(--muted);
  cursor: pointer; padding: 4px; border-radius: 6px; transition: color .15s;
}
.modal-close:hover { color: var(--text); }
.modal-body { padding: 22px 24px; }
.modal-footer {
  display: flex; gap: 10px; justify-content: flex-end;
  padding: 18px 24px; border-top: 1px solid var(--border);
}

/* ── Form ───────────────────────────────────────────────────── */
.form-grid { display: grid; gap: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: .3px; }
.form-control {
  padding: 10px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm); color: var(--text);
  font-family: var(--font-body); font-size: 14px;
  transition: border-color .18s;
}
.form-control:focus { outline: none; border-color: var(--accent); }
.form-control::placeholder { color: var(--muted); }
select.form-control option { background: var(--surface); }

/* ── Tabs ───────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
.tab {
  padding: 10px 18px; background: none; border: none;
  color: var(--muted); font-family: var(--font-body); font-size: 13.5px; font-weight: 500;
  cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all .18s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Toast ──────────────────────────────────────────────────── */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--card); border: 1px solid var(--border-hi);
  border-radius: var(--r-sm); padding: 12px 18px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13.5px; min-width: 260px;
  animation: toastIn .25s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.toast.ok     { border-left: 3px solid var(--success); }
.toast.error  { border-left: 3px solid var(--danger); }
@keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform:none; } }

/* ── Empty state ────────────────────────────────────────────── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted);
}
.empty svg { margin-bottom: 16px; opacity: .3; }
.empty h3 { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }

/* ── Utilidades ─────────────────────────────────────────────── */
.flex { display: flex; } .items-center { align-items: center; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .flex-1 { flex: 1; }
.mono { font-family: var(--font-mono); }
.text-muted { color: var(--muted); }
.text-danger { color: var(--danger); }
.text-success { color: var(--success); }
.mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">

<!-- ── Sidebar ──────────────────────────────────────────────── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>ApiC</h1>
    <p>Control de Facturas</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-label">Módulos</div>
      <button class="nav-btn active" data-view="proveedores" onclick="setView('proveedores')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Proveedores
      </button>
      <button class="nav-btn" data-view="asociaciones" onclick="setView('asociaciones')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Asociaciones
      </button>
      <button class="nav-btn" data-view="municipalidades" onclick="setView('municipalidades')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Municipalidades
      </button>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div id="sidebar-date" class="mono" style="font-size:11px;"></div>
  </div>
</aside>

<!-- ── Main ─────────────────────────────────────────────────── -->
<main class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Proveedores</div>
    <div class="topbar-date mono" id="topbar-date"></div>
  </div>

  <div class="content" id="content">
    <!-- Se renderiza dinámicamente -->
  </div>
</main>

</div><!-- /.app -->

<!-- ── Modal Entidad ─────────────────────────────────────────── -->
<div class="overlay" id="modal-entidad">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-entidad-title">Nueva Entidad</div>
      <button class="modal-close" onclick="closeModal('modal-entidad')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">NIT *</label>
            <input class="form-control" id="e-nit" placeholder="1234567-8">
          </div>
          <div class="form-group">
            <label class="form-label">Teléfono</label>
            <input class="form-control" id="e-tel" placeholder="2222-3333">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Nombre / Razón social *</label>
          <input class="form-control" id="e-nombre" placeholder="Empresa S.A.">
        </div>
        <div class="form-group">
          <label class="form-label">Dirección</label>
          <input class="form-control" id="e-dir" placeholder="Ciudad de Guatemala">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-entidad')">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-entidad" onclick="saveEntidad()">Guardar</button>
    </div>
  </div>
</div>

<!-- ── Modal Factura ─────────────────────────────────────────── -->
<div class="overlay" id="modal-factura">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-factura-title">Nueva Factura</div>
      <button class="modal-close" onclick="closeModal('modal-factura')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Serie / No. de Factura *</label>
            <input class="form-control" id="f-serie" placeholder="A-001-2024">
          </div>
          <div class="form-group">
            <label class="form-label">Monto (Q) *</label>
            <input class="form-control" id="f-monto" type="number" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Fecha de emisión *</label>
            <input class="form-control" id="f-emision" type="date">
          </div>
          <div class="form-group">
            <label class="form-label">Fecha de vencimiento</label>
            <input class="form-control" id="f-vence" type="date">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Descripción</label>
          <input class="form-control" id="f-desc" placeholder="Servicios prestados...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Forma de pago</label>
            <select class="form-control" id="f-tipo-pago" onchange="toggleRef()">
              <option value="pendiente">Pendiente</option>
              <option value="cheque">Cheque</option>
              <option value="deposito">Depósito</option>
            </select>
          </div>
          <div class="form-group" id="ref-group">
            <label class="form-label">No. de referencia</label>
            <input class="form-control" id="f-ref" placeholder="No. cheque / depósito">
          </div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="f-pagado" style="width:15px;height:15px;accent-color:var(--success);">
            <span class="form-label" style="margin:0;">Marcar como pagada</span>
          </label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-factura')">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-factura" onclick="saveFactura()">Guardar</button>
    </div>
  </div>
</div>

<!-- ── Toasts ─────────────────────────────────────────────────── -->
<div class="toast-container" id="toast-container"></div>

<script>
// ── Estado global ────────────────────────────────────────────
const API = 'http://localhost:8080';
let currentView = 'proveedores';   // proveedores | asociaciones | municipalidades
let currentEntidad = null;         // objeto entidad seleccionado
let editingEntidad = null;         // nit si edición
let editingFactura = null;         // id si edición
let g_entidades_cache = [];        // BUG #8 CORREGIDO: cache de entidades para búsqueda
const TIPO_MAP = { proveedores:'proveedor', asociaciones:'asociacion', municipalidades:'municipalidad' };

// ── Fecha ─────────────────────────────────────────────────────
function hoyStr() {
  return new Date().toISOString().slice(0,10);
}
function formatFecha(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}
function esVencida(f) {
  return !f.pagado && f.fechaVencimiento && f.fechaVencimiento < hoyStr();
}
function formatQ(n) {
  return 'Q ' + Number(n).toLocaleString('es-GT', {minimumFractionDigits:2, maximumFractionDigits:2});
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ── API helpers ───────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  let r;
  try {
    r = await fetch(API + path, opts);
  } catch(err) {
    throw new Error('No se pudo conectar al servidor. Verifica que ApiC esté ejecutándose en http://localhost:8080');
  }
  const data = await r.json();
  // BUG #4 CORREGIDO: propagar errores HTTP (4xx, 5xx) al llamador
  if (!r.ok) throw new Error(data.error || `Error ${r.status}`);
  return data;
}

// ── Modal helpers ─────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ── Navegación principal ──────────────────────────────────────
function setView(v) {
  currentView = v;
  currentEntidad = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  const titles = { proveedores:'Proveedores', asociaciones:'Asociaciones (Crédito)', municipalidades:'Municipalidades (Crédito)' };
  document.getElementById('topbar-title').textContent = titles[v];
  renderView();
}

async function renderView() {
  if (currentEntidad) { renderDetalle(); return; }
  renderListaEntidades();
}

// ── Lista de entidades ────────────────────────────────────────
async function renderListaEntidades() {
  const tipo = TIPO_MAP[currentView];
  let entidades, resumen;
  try {
    [entidades, resumen] = await Promise.all([
      api('GET', `/entidades?tipo=${tipo}`),
      api('GET', `/resumen?tipo=${tipo}`)
    ]);
  } catch(err) {
    toast(err.message, 'error');
    entidades = []; resumen = {};
  }
  // BUG #6 CORREGIDO: guardar cache para el filtro de búsqueda
  g_entidades_cache = entidades;

  const content = document.getElementById('content');
  content.innerHTML = `
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi danger">
        <div class="kpi-label">⚠ Facturas vencidas</div>
        <div class="kpi-val">${formatQ(resumen.vencidas?.total||0)}</div>
        <div class="kpi-sub">${resumen.vencidas?.count||0} factura(s)</div>
      </div>
      <div class="kpi warn">
        <div class="kpi-label">⏳ Pendientes de pago</div>
        <div class="kpi-val">${formatQ(resumen.pendientes?.total||0)}</div>
        <div class="kpi-sub">${resumen.pendientes?.count||0} factura(s)</div>
      </div>
      <div class="kpi ok">
        <div class="kpi-label">✓ Total pagado</div>
        <div class="kpi-val">${formatQ(resumen.pagadas?.total||0)}</div>
        <div class="kpi-sub">${resumen.pagadas?.count||0} factura(s)</div>
      </div>
    </div>

    <!-- Acciones -->
    <div class="actions-bar">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="search-ent" placeholder="Buscar por nombre o NIT..." oninput="filterEntidades()" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="abrirModalEntidad()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva entidad
      </button>
    </div>

    <!-- Grid de entidades -->
    <div class="entity-grid" id="entity-grid"></div>
  `;

  renderEntidadCards(entidades);
}

function renderEntidadCards(entidades) {
  const grid = document.getElementById('entity-grid');
  if (!entidades.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <h3>Sin entidades registradas</h3>
      <p>Agrega la primera entidad con el botón de arriba.</p>
    </div>`;
    return;
  }
  grid.innerHTML = entidades.map(e => {
    const vencidas = e.facturas.filter(f => esVencida(f)).length;
    const total = e.facturas.reduce((s,f) => s + f.monto, 0);
    return `
      <div class="entity-card" onclick="seleccionarEntidad('${e.nit}')">
        <div class="entity-card-head">
          <div>
            <div class="entity-name">${e.nombre}</div>
            <div class="entity-nit mono">NIT: ${e.nit}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            ${vencidas ? `<span class="badge-pill badge-vencida">⚠ ${vencidas} vencida${vencidas>1?'s':''}</span>` : ''}
            <button class="btn btn-danger btn-sm btn-icon" onclick="event.stopPropagation();deleteEntidad('${e.nit}','${e.nombre}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>
        </div>
        ${e.direccion ? `<div style="font-size:12px;color:var(--muted);">${e.direccion}</div>` : ''}
        <div class="entity-stats">
          <div class="entity-stat">
            <div class="entity-stat-val mono">${e.facturas.length}</div>
            <div class="entity-stat-lbl">Facturas</div>
          </div>
          <div class="entity-stat">
            <div class="entity-stat-val mono text-${vencidas?'danger':'muted'}">${vencidas}</div>
            <div class="entity-stat-lbl">Vencidas</div>
          </div>
          <div class="entity-stat">
            <div class="entity-stat-val mono">${formatQ(total)}</div>
            <div class="entity-stat-lbl">Total</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function filterEntidades() {
  // BUG #7 CORREGIDO: filtrar sobre datos en lugar de ocultar nodos DOM
  // (evita que queden cards ocultas al editar/borrar texto)
  const q = document.getElementById('search-ent')?.value.toLowerCase() || '';
  const filtered = q ? g_entidades_cache.filter(e =>
    e.nombre.toLowerCase().includes(q) || e.nit.toLowerCase().includes(q)
  ) : g_entidades_cache;
  renderEntidadCards(filtered);
}

// ── Detalle de entidad + facturas ─────────────────────────────
async function seleccionarEntidad(nit) {
  const e = await api('GET', `/entidades/${nit}`);
  currentEntidad = e;
  renderDetalle();
}

async function renderDetalle() {
  const e = currentEntidad;
  const content = document.getElementById('content');

  const vencidas  = e.facturas.filter(f => esVencida(f));
  const pendientes = e.facturas.filter(f => !f.pagado && !esVencida(f));
  const pagadas   = e.facturas.filter(f => f.pagado);
  const totalVenc = vencidas.reduce((s,f)=>s+f.monto,0);

  content.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" onclick="volverLista()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Volver
      </button>
      <div style="flex:1">
        <div style="font-family:var(--font-head);font-size:20px;font-weight:800;">${e.nombre}</div>
        <div class="mono text-muted" style="font-size:12px;">NIT: ${e.nit}${e.telefono?' · '+e.telefono:''}</div>
      </div>
      <button class="btn btn-primary" onclick="abrirModalFactura()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva factura
      </button>
    </div>

    <!-- KPIs detalle -->
    <div class="kpi-row" style="grid-template-columns:repeat(3,1fr);">
      <div class="kpi danger">
        <div class="kpi-label">⚠ Vencidas</div>
        <div class="kpi-val">${formatQ(totalVenc)}</div>
        <div class="kpi-sub">${vencidas.length} factura(s)</div>
      </div>
      <div class="kpi warn">
        <div class="kpi-label">⏳ Pendientes</div>
        <div class="kpi-val">${formatQ(pendientes.reduce((s,f)=>s+f.monto,0))}</div>
        <div class="kpi-sub">${pendientes.length} factura(s)</div>
      </div>
      <div class="kpi ok">
        <div class="kpi-label">✓ Pagadas</div>
        <div class="kpi-val">${formatQ(pagadas.reduce((s,f)=>s+f.monto,0))}</div>
        <div class="kpi-sub">${pagadas.length} factura(s)</div>
      </div>
    </div>

    <!-- Tabla facturas -->
    ${e.facturas.length === 0 ? `
      <div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <h3>Sin facturas</h3>
        <p>Agrega la primera factura con el botón de arriba.</p>
      </div>
    ` : `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Serie</th>
            <th>Emisión</th>
            <th>Vencimiento</th>
            <th>Monto (Q)</th>
            <th>Tipo pago</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          ${e.facturas.map(f => `
            <tr style="${esVencida(f)?'background:rgba(239,68,68,0.04);':''}">
              <td><span class="mono" style="font-size:13px;">${f.serie}</span>
                ${f.descripcion?`<div style="font-size:11px;color:var(--muted);">${f.descripcion}</div>`:''}
              </td>
              <td class="mono" style="font-size:13px;">${formatFecha(f.fechaEmision)}</td>
              <td class="mono" style="font-size:13px;${esVencida(f)?'color:var(--danger);font-weight:600;':''}">
                ${f.fechaVencimiento ? formatFecha(f.fechaVencimiento) + (esVencida(f)?' ⚠':'') : '—'}
              </td>
              <td class="mono" style="font-size:14px;">${formatQ(f.monto)}</td>
              <td>
                ${f.tipoPago==='cheque'   ? '<span class="badge-pill badge-cheque">Cheque</span>'   :
                  f.tipoPago==='deposito' ? '<span class="badge-pill badge-deposito">Depósito</span>' :
                  '<span class="badge-pill badge-pendiente">—</span>'}
                ${f.referenciaPago?`<div class="mono text-muted" style="font-size:10px;margin-top:3px;">${f.referenciaPago}</div>`:''}
              </td>
              <td>
                ${f.pagado ? '<span class="badge-pill badge-pagada">Pagada</span>' :
                  esVencida(f) ? '<span class="badge-pill badge-vencida">Vencida</span>' :
                  '<span class="badge-pill badge-pendiente">Pendiente</span>'}
              </td>
              <td>
                <div class="flex gap-2">
                  <button class="btn btn-secondary btn-sm" onclick="editarFactura('${f.id}')">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </button>
                  <button class="btn btn-danger btn-sm" onclick="deleteFactura('${f.id}')">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                  </button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
    `}
  `;
}

function volverLista() {
  currentEntidad = null;
  renderView();
}

// ── CRUD Entidades ────────────────────────────────────────────
function abrirModalEntidad(nit) {
  editingEntidad = nit || null;
  document.getElementById('modal-entidad-title').textContent = nit ? 'Editar entidad' : 'Nueva entidad';
  if (nit) {
    // BUG #5 CORREGIDO: buscar en g_entidades cache en lugar de depender de currentEntidad
    const e = currentEntidad || g_entidades_cache.find(x => x.nit === nit) || {};
    document.getElementById('e-nit').value    = e.nit    || '';
    document.getElementById('e-nombre').value = e.nombre || '';
    document.getElementById('e-dir').value    = e.direccion || '';
    document.getElementById('e-tel').value    = e.telefono || '';
    document.getElementById('e-nit').disabled = true;
  } else {
    ['e-nit','e-nombre','e-dir','e-tel'].forEach(id => {
      const el = document.getElementById(id); el.value = ''; el.disabled = false;
    });
  }
  openModal('modal-entidad');
}

async function saveEntidad() {
  const nit    = document.getElementById('e-nit').value.trim();
  const nombre = document.getElementById('e-nombre').value.trim();
  if (!nit || !nombre) { toast('NIT y nombre son requeridos', 'error'); return; }

  const body = {
    nit, nombre,
    direccion: document.getElementById('e-dir').value.trim(),
    telefono:  document.getElementById('e-tel').value.trim(),
    tipo: TIPO_MAP[currentView]
  };

  try {
    if (editingEntidad) {
      await api('PUT', `/entidades/${editingEntidad}`, body);
      toast('Entidad actualizada');
    } else {
      await api('POST', '/entidades', body);
      toast('Entidad creada');
    }
    closeModal('modal-entidad');
    renderView();
  } catch(e) { toast('Error al guardar', 'error'); }
}

async function deleteEntidad(nit, nombre) {
  if (!confirm(`¿Eliminar a "${nombre}" y todas sus facturas?`)) return;
  // BUG #9 CORREGIDO: envolver en try/catch
  try {
    await api('DELETE', `/entidades/${nit}`);
    toast('Entidad eliminada');
    renderView();
  } catch(e) { toast(e.message || 'Error al eliminar', 'error'); }
}

// ── CRUD Facturas ─────────────────────────────────────────────
function toggleRef() {
  const v = document.getElementById('f-tipo-pago').value;
  document.getElementById('ref-group').style.display = v === 'pendiente' ? 'none' : '';
}

function abrirModalFactura(fid) {
  editingFactura = fid || null;
  document.getElementById('modal-factura-title').textContent = fid ? 'Editar factura' : 'Nueva factura';

  if (fid && currentEntidad) {
    const f = currentEntidad.facturas.find(x => x.id === fid);
    document.getElementById('f-serie').value    = f.serie;
    document.getElementById('f-monto').value    = f.monto;
    document.getElementById('f-emision').value  = f.fechaEmision;
    document.getElementById('f-vence').value    = f.fechaVencimiento;
    document.getElementById('f-desc').value     = f.descripcion;
    document.getElementById('f-tipo-pago').value = f.tipoPago;
    document.getElementById('f-ref').value      = f.referenciaPago;
    document.getElementById('f-pagado').checked = f.pagado;
  } else {
    document.getElementById('f-serie').value = '';
    document.getElementById('f-monto').value = '';
    document.getElementById('f-emision').value = hoyStr();
    document.getElementById('f-vence').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-tipo-pago').value = 'pendiente';
    document.getElementById('f-ref').value = '';
    document.getElementById('f-pagado').checked = false;
  }
  toggleRef();
  openModal('modal-factura');
}

function editarFactura(fid) { abrirModalFactura(fid); }

async function saveFactura() {
  const serie = document.getElementById('f-serie').value.trim();
  const monto = parseFloat(document.getElementById('f-monto').value);
  if (!serie || isNaN(monto)) { toast('Serie y monto son requeridos', 'error'); return; }

  const body = {
    serie,
    monto,
    fechaEmision:     document.getElementById('f-emision').value,
    fechaVencimiento: document.getElementById('f-vence').value,
    descripcion:      document.getElementById('f-desc').value.trim(),
    tipoPago:         document.getElementById('f-tipo-pago').value,
    referenciaPago:   document.getElementById('f-ref').value.trim(),
    pagado:           document.getElementById('f-pagado').checked
  };

  try {
    const nit = currentEntidad.nit;
    if (editingFactura) {
      await api('PUT', `/entidades/${nit}/facturas/${editingFactura}`, body);
      toast('Factura actualizada');
    } else {
      await api('POST', `/entidades/${nit}/facturas`, body);
      toast('Factura registrada');
    }
    closeModal('modal-factura');
    currentEntidad = await api('GET', `/entidades/${nit}`);
    renderDetalle();
  } catch(e) { toast('Error al guardar', 'error'); }
}

async function deleteFactura(fid) {
  if (!confirm('¿Eliminar esta factura?')) return;
  const nit = currentEntidad.nit;
  // BUG #9 CORREGIDO: envolver en try/catch
  try {
    await api('DELETE', `/entidades/${nit}/facturas/${fid}`);
    toast('Factura eliminada');
    currentEntidad = await api('GET', `/entidades/${nit}`);
    renderDetalle();
  } catch(e) { toast(e.message || 'Error al eliminar', 'error'); }
}

// ── Cerrar modal al hacer clic fuera ──────────────────────────
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
});

// ── Fecha en sidebar / topbar ─────────────────────────────────
function updateDate() {
  const d = new Date();
  const str = d.toLocaleDateString('es-GT', {weekday:'short', year:'numeric', month:'short', day:'numeric'});
  document.getElementById('sidebar-date').textContent = str;
  document.getElementById('topbar-date').textContent = str;
}
updateDate();

// ── Init ──────────────────────────────────────────────────────
renderView();
</script>
</body>
</html>
